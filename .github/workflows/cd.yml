name: CD WORKFLOW 

on:
  workflow_run:
    workflows: ["CI WORKFLOW"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest 
    steps:
      name: Login to SSH 
      - uses: appleboy/ssh-action@v1
        with: 
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            cd ~/Skillpulse-Project1
            git pull origin main
            docker compose pull 
            docker compose up -d 

