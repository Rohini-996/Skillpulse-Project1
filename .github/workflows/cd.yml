name: CD WORKFLOW

on:
  workflow_run:
    workflows: ["CI WORKFLOW"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            if [ ! -d "Skillpulse-Project1" ]; then
              git clone https://github.com/Rohini-996/Skillpulse-Project1.git
            fi

            cd Skillpulse-Project1

            git pull origin main

            docker compose down
            docker compose pull
            docker compose up -d --build
